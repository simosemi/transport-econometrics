model:
  dependent: severity
  fixed:
    continuous:
      - x
  random:
    continuous:
      z:
        distribution: normal
        start_mean: -0.2
        start_sd: 0.3
  group_id: group
  categories: [0, 1, 2]
  correlated_random_parameters: false
  missing: drop

simulation:
  draws: 128
  draw_type: halton
  chunk_size: 10000
  workers: 1
  seed: 12345

estimation:
  optimizer: bfgs
  multistart: 1
  random_seed: 12345
  maxiter: 500
  tolerance: 0.0001
  covariance: bfgs
  checkpoint_interval: 10

output:
  directory: examples/output
